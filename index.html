<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="main-wrapper">
    <aside class="sidebar">
        <div class="menu-header"><i class="fas fa-bars"></i></div>
        <nav>
            <div class="nav-item active"><i class="fas fa-tachometer-alt"></i> Dashboard</div>
            <div class="nav-item"><i class="fas fa-calendar-alt"></i> Calendar</div>
            <div class="nav-item"><i class="fas fa-comment-dots"></i> Chat</div>
            <div class="nav-item"><i class="fas fa-bell"></i> Notifications</div>
            <div class="nav-item"><i class="fas fa-chart-line"></i> Performance</div>
            <div class="nav-item"><i class="fas fa-file-alt"></i> Reports</div>
            <div class="nav-item"><i class="fas fa-sticky-note"></i> Notes</div>
            <div class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</div>
            <div class="nav-item"><i class="fas fa-user-graduate"></i> Trainings</div>
        </nav>
    </aside>

    <main class="content">
        <header class="top-bar">
            <div class="title-section">
                <h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1>
                <p>Overview of all platform statistics</p>
            </div>
            <div class="filter-section">
                <div class="date-inputs">
                    <input type="date" value="2026-04-21">
                    <input type="date" value="2026-04-21">
                </div>
                <button class="apply-btn"><i class="fas fa-filter"></i> Apply</button>
            </div>
        </header>

        <section class="overview-badge">
            <span><i class="fas fa-chart-area"></i> Overview</span>
        </section>

        <div class="stats-grid">
            <div class="card blue"><i class="fas fa-user-circle"></i> <span>0</span><p>STUDENTS</p></div>
            <div class="card green"><i class="fas fa-chalkboard-teacher"></i> <span>0</span><p>TEACHERS</p></div>
            <div class="card purple"><i class="fas fa-clipboard-list"></i> <span>0</span><p>TESTS</p></div>
            <div class="card orange"><i class="fas fa-graduation-cap"></i> <span>0</span><p>TRAININGS</p></div>
            <div class="card teal"><i class="fas fa-book-open"></i> <span>0</span><p>COURSES</p></div>
            <div class="card dark-blue"><i class="fas fa-school"></i> <span>0</span><p>SCHOOLS</p></div>
            <div class="card dark-grey"><i class="fas fa-sitemap"></i> <span>0</span><p>DEPARTMENTS</p></div>
            <div class="card pink"><i class="fas fa-users"></i> <span>0</span><p>EMPLOYEES</p></div>
            <div class="card light-blue"><i class="fas fa-calendar-check"></i> <span>0</span><p>SEMESTERS</p></div>
            <div class="card sky-blue"><i class="fas fa-calendar-alt"></i> <span>0</span><p>ACADEMIC YEARS</p></div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
